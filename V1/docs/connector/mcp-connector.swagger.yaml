# Power Platform custom connector spec for the MCP endpoint.
# AUTH: Basic — each connection stores a NAVEX username/password, forwarded to
# the facade which logs into NAVEX as that user (per-user permissions + audit).
# NOTE: Copilot Studio's MCP onboarding wizard only offers None/API key/OAuth,
# so for Basic auth import THIS file as a custom connector (Option 2 in the
# Microsoft docs) instead of using the wizard.
swagger: '2.0'
info:
  title: NAVEX IRM MCP
  description: >-
    MCP server exposing NAVEX IRM (Lockpath) operations as agent tools:
    component discovery, record search/create/update, workflow transitions,
    report export, assessments, and attachments.
  version: 1.0.0
host: your-app.azurecontainerapps.io   # <-- replace with your deployed host
basePath: /
schemes:
  - https
securityDefinitions:
  basicAuth:
    type: basic
security:
  - basicAuth: []
paths:
  /mcp:
    post:
      summary: NAVEX IRM MCP Server
      x-ms-agentic-protocol: mcp-streamable-1.0
      operationId: InvokeMCP
      responses:
        '200':
          description: Success
